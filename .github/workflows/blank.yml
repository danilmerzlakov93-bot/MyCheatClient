name: Build My Cheat Client

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # ← v4, не v3/v2!
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4  # ← v4!
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3  # ← специальный action для Gradle
        
    - name: Make gradlew executable
      run: chmod +x gradlew
        
    - name: Build with Gradle
      run: ./gradlew build
        
    - name: Upload built JAR
      uses: actions/upload-artifact@v4  # ← v4!
      with:
        name: mycheat-client
        path: build/libs/mycheat-*.jar
